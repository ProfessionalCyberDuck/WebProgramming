  <main id="maincontent" class="container">

    <section class="hero">
      <h2>Internet Addiction Self-Assessment</h2>
      <p>Answer the questions below to get a general idea of your internet usage habits.</p>
    </section>

    <section class="content">

      <form id="quizForm" class="form-box">

        <label>How many hours do you spend online daily?</label>
        <select id="q1">
          <option value="0">Less than 2 hours</option>
          <option value="1">2–5 hours</option>
          <option value="2">More than 5 hours</option>
        </select>

        <label>Do you lose track of time while online?</label>
        <select id="q2">
          <option value="0">Rarely</option>
          <option value="1">Sometimes</option>
          <option value="2">Often</option>
        </select>

        <label>Do you feel anxious when not online?</label>
        <select id="q3">
          <option value="0">No</option>
          <option value="1">Sometimes</option>
          <option value="2">Yes</option>
        </select>

        <label>Does internet use affect your sleep?</label>
        <select id="q4">
          <option value="0">No</option>
          <option value="1">Sometimes</option>
          <option value="2">Yes</option>
        </select>

        <button type="submit">See Results</button>

      </form>

      <div id="resultBox" class="result-box"></div>

    </section>

  </main>
